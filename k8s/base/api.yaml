apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: lake-dev
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: lake-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: lake-api
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: lake-config
            - secretRef:
                name: lake-secrets
                optional: true
          volumeMounts:
            - name: geoip
              mountPath: /data/geoip
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: geoip
          hostPath:
            path: /data/geoip
            type: DirectoryOrCreate
