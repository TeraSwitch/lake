apiVersion: v1
kind: ConfigMap
metadata:
  name: lake-config
  namespace: lake-dev
data:
  # ClickHouse — service name resolves in-cluster
  CLICKHOUSE_ADDR_TCP: "clickhouse:9000"
  CLICKHOUSE_DATABASE: "default"
  CLICKHOUSE_DATABASE_DEVNET: "lake_devnet"
  CLICKHOUSE_DATABASE_TESTNET: "lake_testnet"
  CLICKHOUSE_USERNAME: "default"
  CLICKHOUSE_PASSWORD: ""

  # PostgreSQL
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "lakedev"
  POSTGRES_USER: "lakedev"
  POSTGRES_PASSWORD: "lakedev"
  POSTGRES_RUN_MIGRATIONS: "true"

  # Neo4j
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USERNAME: "neo4j"
  NEO4J_PASSWORD: "password"
  NEO4J_DATABASE: "neo4j"

  # Temporal
  TEMPORAL_HOST_PORT: "temporal:7233"
  TEMPORAL_NAMESPACE: "default"

  # GeoIP (mounted into containers by Tiltfile)
  GEOIP_CITY_DB_PATH: "/data/geoip/GeoLite2-City.mmdb"
  GEOIP_ASN_DB_PATH: "/data/geoip/GeoLite2-ASN.mmdb"

  # Web
  WEB_BASE_URL: "http://localhost:5173"

  # Solana
  SOLANA_RPC_URL: "https://api.mainnet-beta.solana.com"

  # Sentry
  SENTRY_ENVIRONMENT: "development"
